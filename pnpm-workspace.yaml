packages:
  - apps/*
  - packages/*

catalog:
  '@storybook/addon-essentials': ^8.6.15
  '@storybook/addon-interactions': ^8.6.15
  '@storybook/react': ^8.6.18
  '@storybook/react-vite': ^8.6.15
  '@storybook/test': ^8.6.15
  '@tsdown/css': ^0.21.3
  '@types/node': ^24
  '@types/react': ^19.1.13
  '@types/react-dom': ^19.1.9
  classnames: ^2.5.1
  less: ^4.4.1
  react: ^19.1.1
  react-dom: ^19.1.1
  storybook: ^8.6.15
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.11
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
