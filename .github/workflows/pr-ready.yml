name: PR Ready

on:
  pull_request:

concurrency:
  group: pr-ready-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ready:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ready
        run: ./node_modules/.bin/vp run ready
